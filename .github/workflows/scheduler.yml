name: Realty Data Auto Crawler

on:
  schedule:
    - cron: '0 */12 * * *'  # 한국 시간 기준 약 9시, 21시 (UTC 기준 0시, 12시)
  workflow_dispatch:        # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Python Scripts (수집 및 시각화 통합)
      env:
        # 깃허브 Settings -> Secrets에 저장한 키들을 주입
        SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
        KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      run: |
        python main.py           # 1. 전국 데이터 수집 (CSV 생성)
        python visualize_map.py  # 2. 수집된 데이터로 지도 갱신 (HTML 생성)

    - name: Push changes (가장 마지막에 한 번만 실행)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # CSV 데이터와 생성된 지도 파일(HTML)을 모두 깃허브에 올릴 준비
        # (Flask 연동을 위해 templates 폴더 안에 있다면 templates/realty_map.html 로 변경)
        git add data/*.csv realty_map.html templates/*.html || echo "No changes to add"
        
        # 변경사항이 있을 때만 깃허브에 커밋하고 푸시
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Realty data and Map"
        git push