name: Realty Data Auto Crawler

on:
  schedule:
    - cron: '0 */2 * * *'  # 2시간 간격으로 깃허브액션 
  workflow_dispatch:        # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # <-- 이 줄이 requirements.txt를 읽어서 설치하는 핵심입니다!

    - name: Run Python Scripts (수집 및 시각화 통합)
      env:
        SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
        KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}     
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}  
      run: |
        python main.py
        python visualize_map.py

    - name: Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # templates 폴더 안의 html과 data 폴더 안의 csv를 모두 포함
        git add data/*.csv templates/realty_map.html || echo "No changes to add"
        
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Realty data and Map"
        git push