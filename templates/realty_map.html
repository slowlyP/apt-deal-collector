<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>부동산 실거래 지도</title>
    <style>
        #map {
            width: 100%;
            height: 100vh;
            background: #f0f0f0;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div id="loading">📡 데이터를 불러오는 중입니다...</div>
    <div id="map"></div>

    <script type="text/javascript"
        src="http://dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_key }}&libraries=services,clusterer&autoload=false"></script>

    <script>
        // 카카오 라이브러리 로드 대기
        kakao.maps.load(function () {
            console.log("✅ 카카오 지도 로드 완료");

            var mapContainer = document.getElementById('map'),
                mapOption = {
                    center: new kakao.maps.LatLng(37.5668, 126.9786),
                    level: 7
                };

            var map = new kakao.maps.Map(mapContainer, mapOption);
            var ps = new kakao.maps.services.Places();
            var infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // 마커 클러스터러를 생성합니다 (축소 시 묶어주는 기능)
            var clusterer = new kakao.maps.MarkerClusterer({
                map: map, // 마커들을 클러스터로 관리하고 표시할 지도 객체 
                averageCenter: true, // 클러스터에 포함된 마커들의 평균 위치를 클러스터 마커 위치로 설정 
                minLevel: 5 // 클러스터를 적용할 최소 지도 레벨 (이 레벨 이상으로 축소하면 클러스터링 적용)
            });

            // 2. 데이터 가져오기 (주소를 절대경로로 수정)
            fetch('/api/map-data')
                .then(res => res.json())
                .then(deals => {
                    console.log("📦 받은 데이터 개수:", deals.length);
                    document.getElementById('loading').style.display = 'none';

                    deals.forEach(deal => {
                        // 키워드 검색 (법정동 + 아파트이름)
                        ps.keywordSearch(deal.city + ' ' + deal.apt_name, function (result, status) {
                            if (status === kakao.maps.services.Status.OK) {
                                var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                                var marker = new kakao.maps.Marker({ position: coords }); // map 속성 제거

                                kakao.maps.event.addListener(marker, 'click', function () {
                                    var content = `
                                        <div style="padding:10px; font-size:12px; line-height:1.5;">
                                            <strong>${deal.apt_name}</strong><br>
                                            가격: ${deal.deal_amount}만원<br>
                                            면적: ${deal.exclusive_area}㎡<br>
                                            층수: ${deal.floor}층<br>
                                            날짜: ${deal.deal_year}.${deal.deal_month}
                                        </div>`;
                                    infowindow.setContent(content);
                                    infowindow.open(map, marker);
                                });

                                // 클러스터러에 마커 추가
                                clusterer.addMarker(marker);
                            }
                        });
                    });
                })
                .catch(err => {
                    console.error("❌ 데이터 로드 실패:", err);
                    document.getElementById('loading').innerText = "데이터 로드 실패 (서버를 확인하세요)";
                });
        });
    </script>
</body>

</html>
